name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Hanya trigger deploy jika push ke branch main
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v6
    - name: Set up Go
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - name: Run Tests
      run: python manage.py migrate && python manage.py test

  build-and-deploy:
    name: Build Image and Deploy to VPS
    needs: test # Pastikan test lulus dulu, baru boleh deploy!
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.ref == 'refs/heads/main' # Hanya jalankan saat push ke main

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    # 1. Login ke Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 2. Build Docker Image dan Push ke Docker Hub
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        # Format penamaan di Docker Hub: username_dockerhub/nama_image:tag
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/albinaa-web:latest

    # 3. SSH ke VPS untuk eksekusi Pull & Restart
    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          mkdir -p /opt/abn
          cd /opt/abn
          
          curl -O https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml
          
          # Tarik image terbaru dari Docker Hub
          docker compose pull
          
          docker compose up -d
          docker image prune -f