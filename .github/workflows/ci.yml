name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Hanya trigger deploy jika push ke branch main
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    # KARENA DJANGO BUTUH DATABASE SAAT TESTING, KITA NYALAKAN MYSQL SEMENTARA DI GITHUB
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v6
    
    # 1. Samakan versi Python dengan Dockerfile (3.10) agar konsisten
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10' 
        
    # 2. Instal alat tempur Ubuntu agar mysqlclient bisa di-build
    - name: Install MySQL System Dependencies
      run: sudo apt-get update && sudo apt-get install -y default-libmysqlclient-dev build-essential pkg-config
      
    # 3. Instal library Django dari requirements.txt
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Jalankan Test (Gunakan variabel env agar Django terhubung ke MySQL sementara di atas)
    - name: Run Tests
      env:
        DB_HOST: ${{ secrets.DB_HOST }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_NAME: ${{ secrets.DB_NAME }}
        DB_PORT: 3306
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
      # Django test otomatis melakukan migrate ke database test, jadi tidak perlu "migrate" manual
      run: python manage.py test

  build-and-deploy:
    name: Build Image and Deploy to VPS
    needs: test # Pastikan test lulus dulu, baru boleh deploy!
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.ref == 'refs/heads/main' # Hanya jalankan saat push ke main

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    # 1. Login ke Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 2. Build Docker Image dan Push ke Docker Hub
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        # Format penamaan di Docker Hub: username_dockerhub/nama_image:tag
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/albinaa-web:latest

    # 3. SSH ke VPS untuk eksekusi Pull & Restart
    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          mkdir -p /opt/abn
          cd /opt/abn
          
          curl -O https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml
          
          # Tarik image terbaru dari Docker Hub
          docker compose pull
          
          docker compose up -d
          docker image prune -f